# Server Configuration
server.port=${PORT:8080}

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/temp_staff_db?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=always
spring.sql.init.separator=;;
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:curriculum_seed.sql
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_change_in_production_must_be_at_least_256_bits_long}
jwt.expiration=${JWT_EXPIRATION:604800000}

# CORS allowed origins (comma-separated)
allowed.origins=${ALLOWED_ORIGINS:https://dimtscs.me,https://www.dimtscs.me,http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.tempstaff=INFO
